[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# ✅ تحويل طلبات API إلى Render (Proxy)
[[redirects]]
  from = "/api/*"
  to = "https://nasab-tree.onrender.com/api/:splat"
  status = 200
  force = true

# ✅ إصلاح React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200