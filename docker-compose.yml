services:
  mysql:
    image: mysql:8.0
    container_name: nasab-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: nasab_db
      MYSQL_USER: nasab_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nasab-network
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nasab-phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - nasab-network

  backend:
    image: node:18-alpine
    container_name: nasab-api
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=nasab_db
      - DB_USER=nasab_user
      - DB_PASSWORD=${DB_PASSWORD}
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET}
    command: sh -c "npm install && npm run dev"
    depends_on:
      - mysql
    networks:
      - nasab-network

  frontend:
    image: node:18-alpine
    container_name: nasab-pwa
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - nasab-network

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  nasab-network:
    driver: bridge